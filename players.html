<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f172a, #000);
    }

    /* ================= NAV ================= */

    .nav-link {
      position: relative;
      padding: 6px 0;
      transition: color .3s ease;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0%;
      height: 2px;
      background: #3b82f6;
      transition: width .3s ease;
    }

    .nav-link:hover { color: white; }
    .nav-link:hover::after { width: 100%; }

    /* ================= CARD SYSTEM (STABILIZED) ================= */

    .flip-card {
      perspective: 1200px;
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 440px;
      transform-style: preserve-3d;
      transition: transform .7s cubic-bezier(.22,.61,.36,1);
      cursor: pointer;
      will-change: transform;
    }

    .flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 1.2rem;
      overflow: hidden;

      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;

      transform: translateZ(0);

      border: 2px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.05),
        0 10px 25px rgba(0,0,0,0.6);
    }

    .back {
      transform: rotateY(180deg) translateZ(0);
    }

    /* ================= RARITY BACKGROUND ================= */

    .SIGNATURE .face {
      background:
        radial-gradient(circle at top left, rgba(236,72,153,0.15), transparent 60%),
        linear-gradient(to bottom, rgba(30,20,35,0.95), rgba(10,10,15,0.98));
      border-color: rgba(236,72,153,0.6);
    }

    .PRIME .face {
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.15), transparent 60%),
        linear-gradient(to bottom, rgba(20,30,45,0.95), rgba(10,10,15,0.98));
      border-color: rgba(59,130,246,0.6);
    }

    .IMPACT .face {
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.15), transparent 60%),
        linear-gradient(to bottom, rgba(20,35,30,0.95), rgba(10,10,15,0.98));
      border-color: rgba(16,185,129,0.6);
    }

    /* ================= TEAM LOGO ================= */

    .team-logo {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      opacity: 0.15;
    }

    /* ================= POSITION BADGE ================= */

    .position-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
    }

    /* ================= CARD ART ================= */

    .card-art-wrapper {
      height: 200px;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card-art-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ================= STAT BARS ================= */

    .stat-bar {
      height: 10px;
      border-radius: 999px;
      width: 0%;
      transition: width .8s cubic-bezier(.22,.61,.36,1);
    }

    .SIGNATURE .stat-bar {
      background: linear-gradient(to right,#ec4899,#9333ea);
    }

    .PRIME .stat-bar {
      background: linear-gradient(to right,#3b82f6,#6366f1);
    }

    .IMPACT .stat-bar {
      background: linear-gradient(to right,#10b981,#14b8a6);
    }

  </style>
</head>
