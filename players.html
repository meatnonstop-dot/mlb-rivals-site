<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: radial-gradient(circle at top, #111827, #000); }

    .card {
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
    }

    .stat-bar {
      height: 10px;
      border-radius: 999px;
      transition: width 0.8s ease;
    }

    .modal-content {
      transition: 0.3s;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    .rarity-SIGNATURE { box-shadow: 0 0 40px rgba(236,72,153,0.5); }
    .rarity-PRIME { box-shadow: 0 0 40px rgba(59,130,246,0.5); }
    .rarity-IMPACT { box-shadow: 0 0 40px rgba(16,185,129,0.5); }
  </style>
</head>

<body class="text-white min-h-screen">

<header class="sticky top-0 z-50 bg-black/80 backdrop-blur border-b border-white/10">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-2xl font-extrabold tracking-wider text-blue-400">
      MLB RIVALS
    </h1>
    <nav class="hidden md:flex gap-6 text-sm text-white/70">
      <a href="index.html">Home</a>
      <a href="scouts.html">Scouts</a>
      <a href="players.html" class="text-white">Players</a>
      <a href="updates.html">Updates</a>
      <a href="guide.html">Guide</a>
    </nav>
  </div>
</header>

<section class="max-w-6xl mx-auto px-6 py-12">
  <h2 class="text-4xl font-extrabold mb-8">Player Index</h2>
  <div id="playerGrid" class="grid md:grid-cols-3 gap-8"></div>
</section>

<!-- Modal -->
<div id="playerModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center backdrop-blur-sm">
  <div id="modalBox" class="modal-content bg-black rounded-2xl p-8 w-full max-w-lg relative border border-white/10">

    <button onclick="closeModal()" class="absolute top-4 right-4 text-white/60 hover:text-white">
      ✕
    </button>

    <div id="modalContent"></div>

  </div>
</div>

<script>
const players = [
  {
    name: "Shohei Ohtani",
    team: "LAD",
    rarity: "SIGNATURE",
    ovr: 66,
    stats: { Power: 92, Contact: 88, Speed: 78 }
  },
  {
    name: "Aaron Judge",
    team: "NYY",
    rarity: "PRIME",
    ovr: 64,
    stats: { Power: 95, Contact: 84, Speed: 60 }
  },
  {
    name: "Ronald Acuña Jr.",
    team: "ATL",
    rarity: "IMPACT",
    ovr: 65,
    stats: { Power: 89, Contact: 90, Speed: 93 }
  }
];

function renderPlayers() {
  const grid = document.getElementById("playerGrid");
  grid.innerHTML = "";

  players.forEach(player => {

    const card = document.createElement("div");
    card.className = "card bg-black/80 rounded-2xl p-6 cursor-pointer border border-white/10";
    card.onclick = () => openModal(player);

    card.innerHTML = `
      <div class="flex justify-between text-sm mb-2">
        <span>${player.rarity}</span>
        <span>OVR ${player.ovr}</span>
      </div>
      <div class="h-32 bg-white/5 rounded mb-4 flex items-center justify-center text-white/40">
        CARD ART
      </div>
      <h3 class="font-semibold">${player.name}</h3>
      <p class="text-sm text-white/60">${player.team}</p>
    `;

    grid.appendChild(card);
  });
}

function openModal(player) {
  const modal = document.getElementById("playerModal");
  const content = document.getElementById("modalContent");
  const modalBox = document.getElementById("modalBox");

  modalBox.className = "modal-content bg-black rounded-2xl p-8 w-full max-w-lg relative border border-white/10 rarity-" + player.rarity;

  let statsHTML = "";

  for (let stat in player.stats) {
    statsHTML += `
      <div class="mb-4">
        <p class="text-sm mb-1">${stat}</p>
        <div class="bg-white/10 rounded-full">
          <div class="stat-bar" id="stat-${stat}" style="width:0%; background: linear-gradient(to right, #ec4899, #9333ea);"></div>
        </div>
      </div>
    `;
  }

  content.innerHTML = `
    <h2 class="text-2xl font-bold mb-2">${player.name}</h2>
    <p class="text-white/60 mb-6">${player.rarity} · ${player.team} · OVR ${player.ovr}</p>
    ${statsHTML}
  `;

  modal.classList.remove("hidden");
  modal.classList.add("flex");

  setTimeout(() => {
    for (let stat in player.stats) {
      document.getElementById("stat-" + stat).style.width = player.stats[stat] + "%";
    }
  }, 100);
}

function closeModal() {
  const modal = document.getElementById("playerModal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

renderPlayers();
</script>

</body>
</html>
