<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: radial-gradient(circle at top, #111827, #000); }

    .flip-card {
      perspective: 1000px;
    }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 280px;
      transition: transform 0.8s;
      transform-style: preserve-3d;
    }

    .flipped {
      transform: rotateY(180deg);
    }

    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 1rem;
    }

    .flip-front {
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 1.5rem;
    }

    .flip-back {
      background: rgba(0,0,0,0.95);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 1.5rem;
      transform: rotateY(180deg);
    }

    .card-hover {
      transition: 0.3s;
    }

    .card-hover:hover {
      transform: translateY(-8px) scale(1.02);
    }

    .stat-bar {
      height: 10px;
      border-radius: 999px;
      transition: width 0.8s ease;
    }

    .rarity-SIGNATURE .stat-bar {
      background: linear-gradient(to right, #ec4899, #9333ea);
    }

    .rarity-PRIME .stat-bar {
      background: linear-gradient(to right, #3b82f6, #6366f1);
    }

    .rarity-IMPACT .stat-bar {
      background: linear-gradient(to right, #10b981, #14b8a6);
    }
  </style>
</head>

<body class="text-white min-h-screen">

<header class="sticky top-0 z-50 bg-black/80 backdrop-blur border-b border-white/10">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-2xl font-extrabold tracking-wider text-blue-400">
      MLB RIVALS
    </h1>
    <nav class="hidden md:flex gap-6 text-sm text-white/70">
      <a href="index.html">Home</a>
      <a href="scouts.html">Scouts</a>
      <a href="players.html" class="text-white">Players</a>
      <a href="updates.html">Updates</a>
      <a href="guide.html">Guide</a>
    </nav>
  </div>
</header>

<section class="max-w-6xl mx-auto px-6 py-12">
  <h2 class="text-4xl font-extrabold mb-8">Player Index</h2>
  <div id="playerGrid" class="grid md:grid-cols-3 gap-10"></div>
</section>

<script>
const players = [
  {
    name: "Shohei Ohtani",
    team: "LAD",
    rarity: "SIGNATURE",
    ovr: 66,
    stats: { Power: 92, Contact: 88, Speed: 78 }
  },
  {
    name: "Aaron Judge",
    team: "NYY",
    rarity: "PRIME",
    ovr: 64,
    stats: { Power: 95, Contact: 84, Speed: 60 }
  },
  {
    name: "Ronald Acuña Jr.",
    team: "ATL",
    rarity: "IMPACT",
    ovr: 65,
    stats: { Power: 89, Contact: 90, Speed: 93 }
  }
];

function renderPlayers() {
  const grid = document.getElementById("playerGrid");
  grid.innerHTML = "";

  players.forEach((player, index) => {

    let statsHTML = "";
    for (let stat in player.stats) {
      statsHTML += `
        <div class="mb-3">
          <p class="text-sm mb-1">${stat}</p>
          <div class="bg-white/10 rounded-full">
            <div class="stat-bar" id="stat-${index}-${stat}" style="width:0%"></div>
          </div>
        </div>
      `;
    }

    const card = document.createElement("div");
    card.className = "flip-card rarity-" + player.rarity;

    card.innerHTML = `
      <div class="flip-inner card-hover cursor-pointer" onclick="flipCard(this, ${index})">
        
        <div class="flip-front">
          <div class="flex justify-between text-sm mb-2">
            <span>${player.rarity}</span>
            <span>OVR ${player.ovr}</span>
          </div>
          <div class="h-32 bg-white/5 rounded mb-4 flex items-center justify-center text-white/40">
            CARD ART
          </div>
          <h3 class="font-semibold">${player.name}</h3>
          <p class="text-sm text-white/60">${player.team}</p>
        </div>

        <div class="flip-back">
          <h3 class="font-bold mb-4">${player.name}</h3>
          ${statsHTML}
        </div>

      </div>
    `;

    grid.appendChild(card);
  });
}

function flipCard(element, index) {
  element.classList.toggle("flipped");

  if (element.classList.contains("flipped")) {
    const player = players[index];
    setTimeout(() => {
      for (let stat in player.stats) {
        document.getElementById(`stat-${index}-${stat}`).style.width = player.stats[stat] + "%";
      }
    }, 200);
  }
}

renderPlayers();
</script>

</body>
</html>
