<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background:
        radial-gradient(circle at center, rgba(30,41,59,0.6), #000 70%),
        url("https://images.unsplash.com/photo-1508341591423-4347099e1f19?q=80&w=1920&auto=format&fit=crop");
      background-size: cover;
      background-attachment: fixed;
      background-blend-mode: overlay;
    }

    /* ===== CARD BASE ===== */
    .flip-card { perspective: 1200px; }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 330px;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(.22,.61,.36,1);
    }

    .flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      backface-visibility: hidden;
      padding: 1.5rem;
      overflow: hidden;
      background: rgba(0,0,0,0.9);
    }

    .back {
      transform: rotateY(180deg);
      background: rgba(0,0,0,0.95);
    }

    /* ===== ENERGY RING ===== */
    .energy-ring::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 20px;
      z-index: -1;
      animation: spin 6s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ===== SOFT BORDER GLOW ===== */
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 20px rgba(255,255,255,0.1); }
      50% { box-shadow: 0 0 35px rgba(255,255,255,0.25); }
    }

    .glow-breathe {
      animation: breathe 4s ease-in-out infinite;
    }

    /* ===== SHINE ===== */
    .shine::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 45%,
        rgba(255,255,255,0.12),
        transparent 55%
      );
      transform: translateX(-100%);
      animation: sweep 7s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0% { transform: translateX(-100%); opacity: 0; }
      40% { opacity: 0.35; }
      60% { opacity: 0.35; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    /* ===== TILT ===== */
    .tilt-layer {
      width: 100%;
      height: 100%;
      transition: transform 0.15s ease-out;
    }

    /* ===== STAT BARS ===== */
    .stat-bar {
      height: 10px;
      border-radius: 999px;
      width: 0%;
      transition: width 0.9s cubic-bezier(.22,.61,.36,1);
    }

    /* ===== RARITY COLORS ===== */
    .SIGNATURE .stat-bar {
      background: linear-gradient(to right, #ec4899, #9333ea);
    }
    .PRIME .stat-bar {
      background: linear-gradient(to right, #3b82f6, #6366f1);
    }
    .IMPACT .stat-bar {
      background: linear-gradient(to right, #10b981, #14b8a6);
    }

    .SIGNATURE.energy-ring::before {
      background: conic-gradient(#ec4899, #9333ea, #ec4899);
    }
    .PRIME.energy-ring::before {
      background: conic-gradient(#3b82f6, #6366f1, #3b82f6);
    }
    .IMPACT.energy-ring::before {
      background: conic-gradient(#10b981, #14b8a6, #10b981);
    }

  </style>
</head>

<body class="text-white min-h-screen">

<header class="bg-black/70 backdrop-blur border-b border-white/10 p-5">
  <h1 class="text-2xl font-extrabold text-blue-400">MLB RIVALS</h1>
</header>

<section class="max-w-6xl mx-auto px-6 py-10">

  <h2 class="text-4xl font-extrabold mb-6">Player Index</h2>

  <div class="flex flex-col md:flex-row gap-4 mb-8">
    <input id="searchInput"
      placeholder="Search player..."
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/3"
      oninput="renderPlayers()">

    <select id="teamFilter"
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/4"
      onchange="renderPlayers()">
      <option value="all">All Teams</option>
      <option value="LAD">LAD</option>
      <option value="NYY">NYY</option>
      <option value="ATL">ATL</option>
    </select>

    <select id="sortOVR"
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/4"
      onchange="renderPlayers()">
      <option value="desc">Sort OVR High → Low</option>
      <option value="asc">Sort OVR Low → High</option>
    </select>
  </div>

  <div id="playerGrid" class="grid md:grid-cols-3 gap-10"></div>

</section>

<script>
const players = [
  { name: "Shohei Ohtani", team: "LAD", rarity: "SIGNATURE", ovr: 66,
    stats: { Power: 92, Contact: 88, Speed: 78 } },

  { name: "Aaron Judge", team: "NYY", rarity: "PRIME", ovr: 64,
    stats: { Power: 95, Contact: 84, Speed: 60 } },

  { name: "Ronald Acuña Jr.", team: "ATL", rarity: "IMPACT", ovr: 65,
    stats: { Power: 89, Contact: 90, Speed: 93 } }
];

function renderPlayers() {

  const grid = document.getElementById("playerGrid");
  grid.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();
  const team = document.getElementById("teamFilter").value;
  const sort = document.getElementById("sortOVR").value;

  let filtered = players.filter(p =>
    p.name.toLowerCase().includes(search) &&
    (team === "all" || p.team === team)
  );

  filtered.sort((a,b) =>
    sort === "desc" ? b.ovr - a.ovr : a.ovr - b.ovr
  );

  filtered.forEach((player, index) => {

    let statsHTML = "";
    for (let stat in player.stats) {
      statsHTML += `
        <div class="mb-3">
          <p class="text-sm mb-1">${stat}</p>
          <div class="bg-white/10 rounded-full">
            <div class="stat-bar" id="stat-${index}-${stat}"></div>
          </div>
        </div>
      `;
    }

    const card = document.createElement("div");
    card.className = "flip-card energy-ring glow-breathe " + player.rarity;

    card.innerHTML = `
      <div class="flip-inner">
        <div class="tilt-layer"
             onclick="flipCard(this.parentElement, ${index})"
             onmousemove="tiltCard(event, this)"
             onmouseleave="resetTilt(this)">

          <div class="face shine">
            <div class="flex justify-between text-sm mb-2">
              <span>${player.rarity}</span>
              <span>OVR ${player.ovr}</span>
            </div>

            <div class="h-40 bg-white/5 rounded mb-4 flex items-center justify-center text-white/40">
              CARD ART
            </div>

            <h3 class="font-semibold">${player.name}</h3>
            <p class="text-sm text-white/60">${player.team}</p>
          </div>

          <div class="face back">
            <h3 class="font-bold mb-4">${player.name}</h3>
            ${statsHTML}
          </div>

        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

function flipCard(flipInner, index) {

  flipInner.classList.toggle("flipped");

  if (flipInner.classList.contains("flipped")) {
    const player = players[index];

    setTimeout(() => {
      for (let stat in player.stats) {
        document.getElementById(`stat-${index}-${stat}`)
          .style.width = player.stats[stat] + "%";
      }
    }, 200);
  }
}

function tiltCard(event, element) {

  const rect = element.getBoundingClientRect();
  const x = (event.clientX - rect.left) / rect.width - 0.5;
  const y = (event.clientY - rect.top) / rect.height - 0.5;

  const rotateX = y * -5;
  const rotateY = x * 5;

  element.style.transform =
    `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
}

function resetTilt(element) {
  element.style.transform = "rotateX(0deg) rotateY(0deg)";
}

renderPlayers();
</script>

</body>
</html>
