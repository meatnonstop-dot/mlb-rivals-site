<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #111827, #000);
    }

    /* Rotating Sweep Animation */
    @keyframes rotateBorder {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .card-wrapper {
      position: relative;
      border-radius: 1rem;
      overflow: hidden;
    }

    .card-wrapper::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 1.2rem;
      animation: rotateBorder 4s linear infinite;
      z-index: 0;
    }

    .card-inner {
      position: relative;
      background: rgba(0,0,0,0.85);
      border-radius: 1rem;
      padding: 1.5rem;
      z-index: 1;
      transition: 0.3s;
    }

    .card-inner:hover {
      transform: translateY(-8px) scale(1.02);
    }

    /* Rarity Themes */
    .rarity-signature::before {
      background: conic-gradient(
        from 0deg,
        #ec4899,
        #9333ea,
        #ec4899
      );
    }

    .rarity-prime::before {
      background: conic-gradient(
        from 0deg,
        #3b82f6,
        #6366f1,
        #3b82f6
      );
    }

    .rarity-impact::before {
      background: conic-gradient(
        from 0deg,
        #10b981,
        #14b8a6,
        #10b981
      );
    }

    .stat-bar {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(to right, #ec4899, #9333ea);
    }
  </style>
</head>

<body class="text-white min-h-screen">

<header class="sticky top-0 z-50 bg-black/80 backdrop-blur border-b border-white/10">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-2xl font-extrabold tracking-wider text-blue-400">
      MLB RIVALS
    </h1>
    <nav class="hidden md:flex gap-6 text-sm text-white/70">
      <a href="index.html">Home</a>
      <a href="scouts.html">Scouts</a>
      <a href="players.html" class="text-white">Players</a>
      <a href="updates.html">Updates</a>
      <a href="guide.html">Guide</a>
    </nav>
  </div>
</header>

<section class="max-w-6xl mx-auto px-6 py-12">

  <h2 class="text-4xl font-extrabold mb-8">Player Index</h2>

  <div class="flex flex-col md:flex-row gap-4 mb-10">
    <input 
      id="searchInput"
      type="text"
      placeholder="Search player..."
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/2"
      onkeyup="renderPlayers()"
    />

    <select 
      id="teamFilter"
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/4"
      onchange="renderPlayers()"
    >
      <option value="all">All Teams</option>
      <option value="LAD">LAD</option>
      <option value="NYY">NYY</option>
      <option value="ATL">ATL</option>
    </select>
  </div>

  <div id="playerGrid" class="grid md:grid-cols-2 gap-10"></div>

</section>

<script>
const players = [
  {
    name: "Shohei Ohtani",
    team: "LAD",
    rarity: "signature",
    ovr: 66,
    stats: { Power: 92, Contact: 88 }
  },
  {
    name: "Aaron Judge",
    team: "NYY",
    rarity: "prime",
    ovr: 64,
    stats: { Power: 95, Contact: 84 }
  },
  {
    name: "Ronald Acuña Jr.",
    team: "ATL",
    rarity: "impact",
    ovr: 65,
    stats: { Power: 89, Contact: 90 }
  }
];

function renderPlayers() {
  const grid = document.getElementById("playerGrid");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const teamFilter = document.getElementById("teamFilter").value;

  grid.innerHTML = "";

  players
    .filter(p =>
      p.name.toLowerCase().includes(search) &&
      (teamFilter === "all" || p.team === teamFilter)
    )
    .forEach(player => {

      let statsHTML = "";
      for (let stat in player.stats) {
        statsHTML += `
          <div>
            <p class="text-sm mb-1">${stat}</p>
            <div class="bg-white/10 rounded-full">
              <div class="stat-bar" style="width:${player.stats[stat]}%"></div>
            </div>
          </div>
        `;
      }

      const card = document.createElement("details");
      card.className = "card-wrapper rarity-" + player.rarity;

      card.innerHTML = `
        <summary class="card-inner cursor-pointer list-none">
          <div class="flex justify-between text-sm mb-2">
            <span>${player.rarity.toUpperCase()}</span>
            <span>OVR ${player.ovr}</span>
          </div>
          <div class="h-40 bg-white/5 rounded mb-4 flex items-center justify-center text-white/40">
            CARD ART
          </div>
          <h3 class="font-semibold">${player.name}</h3>
          <p class="text-sm text-white/60">${player.team}</p>
        </summary>

        <div class="bg-black/90 p-6 space-y-4">
          ${statsHTML}
        </div>
      `;

      grid.appendChild(card);
    });
}

renderPlayers();
</script>

</body>
</html>
