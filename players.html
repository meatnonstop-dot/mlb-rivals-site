<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: radial-gradient(circle at top, #0f172a, #000); }

    /* === CARD STRUCTURE === */
    .flip-card { perspective: 1200px; }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 320px;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
    }

    .flipped { transform: rotateY(180deg); }

    .flip-front, .flip-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 1rem;
      backface-visibility: hidden;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .flip-front {
      background: rgba(0,0,0,0.92);
      padding: 1.5rem;
    }

    .flip-back {
      background: rgba(0,0,0,0.97);
      padding: 1.5rem;
      transform: rotateY(180deg);
    }

    /* === TILT WRAPPER (separate from flip transform) === */
    .tilt-wrapper {
      width: 100%;
      height: 100%;
      transition: transform 0.2s ease;
    }

    /* === SHINE === */
    .shine::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 45%,
        rgba(255,255,255,0.12),
        transparent 55%
      );
      transform: translateX(-100%);
      animation: shineMove 6s infinite linear;
      pointer-events: none;
    }

    @keyframes shineMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* === STAT BAR === */
    .stat-bar {
      height: 10px;
      border-radius: 999px;
      width: 0%;
      transition: width 0.8s ease;
    }

    /* === RARITY THEMES === */
    .SIGNATURE .stat-bar {
      background: linear-gradient(to right, #ec4899, #9333ea);
    }
    .PRIME .stat-bar {
      background: linear-gradient(to right, #3b82f6, #6366f1);
    }
    .IMPACT .stat-bar {
      background: linear-gradient(to right, #10b981, #14b8a6);
    }

    .SIGNATURE { box-shadow: 0 0 25px rgba(236,72,153,0.4); }
    .PRIME { box-shadow: 0 0 25px rgba(59,130,246,0.4); }
    .IMPACT { box-shadow: 0 0 25px rgba(16,185,129,0.4); }

  </style>
</head>

<body class="text-white min-h-screen">

<header class="bg-black/80 backdrop-blur border-b border-white/10 p-5">
  <h1 class="text-2xl font-extrabold text-blue-400">MLB RIVALS</h1>
</header>

<section class="max-w-6xl mx-auto px-6 py-10">

  <h2 class="text-4xl font-extrabold mb-6">Player Index</h2>

  <!-- CONTROLS -->
  <div class="flex flex-col md:flex-row gap-4 mb-8">
    <input id="searchInput"
      placeholder="Search player..."
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/3"
      oninput="renderPlayers()">

    <select id="teamFilter"
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/4"
      onchange="renderPlayers()">
      <option value="all">All Teams</option>
      <option value="LAD">LAD</option>
      <option value="NYY">NYY</option>
      <option value="ATL">ATL</option>
    </select>

    <select id="sortOVR"
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/4"
      onchange="renderPlayers()">
      <option value="desc">Sort OVR High → Low</option>
      <option value="asc">Sort OVR Low → High</option>
    </select>
  </div>

  <div id="playerGrid" class="grid md:grid-cols-3 gap-8"></div>

</section>

<script>
const players = [
  { name: "Shohei Ohtani", team: "LAD", rarity: "SIGNATURE", ovr: 66,
    stats: { Power: 92, Contact: 88, Speed: 78 } },

  { name: "Aaron Judge", team: "NYY", rarity: "PRIME", ovr: 64,
    stats: { Power: 95, Contact: 84, Speed: 60 } },

  { name: "Ronald Acuña Jr.", team: "ATL", rarity: "IMPACT", ovr: 65,
    stats: { Power: 89, Contact: 90, Speed: 93 } }
];

function renderPlayers() {

  const grid = document.getElementById("playerGrid");
  grid.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();
  const team = document.getElementById("teamFilter").value;
  const sort = document.getElementById("sortOVR").value;

  let filtered = players.filter(p =>
    p.name.toLowerCase().includes(search) &&
    (team === "all" || p.team === team)
  );

  filtered.sort((a,b) =>
    sort === "desc" ? b.ovr - a.ovr : a.ovr - b.ovr
  );

  filtered.forEach((player, index) => {

    let statsHTML = "";
    for (let stat in player.stats) {
      statsHTML += `
        <div class="mb-3">
          <p class="text-sm mb-1">${stat}</p>
          <div class="bg-white/10 rounded-full">
            <div class="stat-bar" id="stat-${index}-${stat}"></div>
          </div>
        </div>
      `;
    }

    const card = document.createElement("div");
    card.className = "flip-card " + player.rarity;

    card.innerHTML = `
      <div class="flip-inner">

        <div class="tilt-wrapper cursor-pointer"
             onclick="flipCard(this.parentElement, ${index})"
             onmousemove="tiltCard(event, this)"
             onmouseleave="resetTilt(this)">

          <div class="flip-front shine relative">
            <div class="flex justify-between text-sm mb-2">
              <span>${player.rarity}</span>
              <span>OVR ${player.ovr}</span>
            </div>

            <div class="h-40 bg-white/5 rounded mb-4 flex items-center justify-center text-white/40">
              CARD ART
            </div>

            <h3 class="font-semibold">${player.name}</h3>
            <p class="text-sm text-white/60">${player.team}</p>
          </div>

          <div class="flip-back">
            <h3 class="font-bold mb-4">${player.name}</h3>
            ${statsHTML}
          </div>

        </div>

      </div>
    `;

    grid.appendChild(card);
  });
}

function flipCard(flipInner, index) {

  flipInner.classList.toggle("flipped");

  if (flipInner.classList.contains("flipped")) {
    const player = players[index];

    setTimeout(() => {
      for (let stat in player.stats) {
        document.getElementById(`stat-${index}-${stat}`)
          .style.width = player.stats[stat] + "%";
      }
    }, 200);
  }
}

function tiltCard(event, element) {

  const rect = element.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;

  const rotateX = ((y / rect.height) - 0.5) * -10;
  const rotateY = ((x / rect.width) - 0.5) * 10;

  element.style.transform =
    `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
}

function resetTilt(element) {
  element.style.transform = "rotateX(0deg) rotateY(0deg)";
}

renderPlayers();
</script>

</body>
</html>
