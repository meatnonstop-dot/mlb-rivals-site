<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f172a, #000);
    }

    /* ================= NAVIGATION ================= */

    .nav-link {
      position: relative;
      padding: 6px 0;
      transition: color .3s ease;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0%;
      height: 2px;
      background: #3b82f6;
      transition: width .3s ease;
    }

    .nav-link:hover { color: white; }
    .nav-link:hover::after { width: 100%; }

    /* ================= CARD STRUCTURE ================= */

    .flip-card { perspective: 1200px; }

    .flip-inner {
      position: relative;
      width: 100%;
      height: 430px;
      transform-style: preserve-3d;
      transition: transform .7s cubic-bezier(.22,.61,.36,1);
      cursor: pointer;
    }

    .flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      backface-visibility: hidden;
      padding: 1.2rem;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow:
        inset 0 0 10px rgba(255,255,255,0.05),
        0 10px 25px rgba(0,0,0,0.6);
    }

    .back { transform: rotateY(180deg); }

    /* ================= RARITY BACKGROUNDS ================= */

    .SIGNATURE .face {
      background:
        radial-gradient(circle at top left, rgba(236,72,153,0.15), transparent 60%),
        linear-gradient(to bottom, rgba(30,20,35,0.95), rgba(10,10,15,0.98));
      border-color: rgba(236,72,153,0.6);
    }

    .PRIME .face {
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.15), transparent 60%),
        linear-gradient(to bottom, rgba(20,30,45,0.95), rgba(10,10,15,0.98));
      border-color: rgba(59,130,246,0.6);
    }

    .IMPACT .face {
      background:
        radial-gradient(circle at top left, rgba(16,185,129,0.15), transparent 60%),
        linear-gradient(to bottom, rgba(20,35,30,0.95), rgba(10,10,15,0.98));
      border-color: rgba(16,185,129,0.6);
    }

    /* ================= TEAM LOGO ================= */

    .team-logo {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      opacity: 0.15;
    }

    /* ================= POSITION BADGE ================= */

    .position-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
    }

    /* ================= CARD ART ================= */

    .card-art-wrapper {
      position: relative;
      height: 200px;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card-art-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ================= STAT BARS ================= */

    .stat-bar {
      height: 10px;
      border-radius: 999px;
      width: 0%;
      transition: width .8s cubic-bezier(.22,.61,.36,1);
    }

    .SIGNATURE .stat-bar {
      background: linear-gradient(to right,#ec4899,#9333ea);
    }

    .PRIME .stat-bar {
      background: linear-gradient(to right,#3b82f6,#6366f1);
    }

    .IMPACT .stat-bar {
      background: linear-gradient(to right,#10b981,#14b8a6);
    }

  </style>
</head>

<body class="text-white min-h-screen">

<header class="bg-black/85 backdrop-blur border-b border-white/10 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <a href="index.html" class="flex items-center gap-3 group">
      <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse group-hover:scale-110 transition"></div>
      <h1 class="text-xl font-extrabold tracking-wider text-blue-400 group-hover:text-blue-300 transition">
        MLB RIVALS
      </h1>
    </a>

    <nav class="flex gap-8 text-sm text-white/70">
      <a href="index.html" class="nav-link">Home</a>
      <a href="scouts.html" class="nav-link">Scouts</a>
      <a href="players.html" class="nav-link text-white">Players</a>
      <a href="updates.html" class="nav-link">Updates</a>
      <a href="guide.html" class="nav-link">Guide</a>
    </nav>

  </div>
</header>

<section class="max-w-7xl mx-auto px-6 py-10">

  <h2 class="text-4xl font-extrabold mb-6">Player Index</h2>

  <!-- Filters -->
  <div class="grid md:grid-cols-4 gap-4 mb-10">

    <input id="searchInput"
      placeholder="Search player..."
      class="bg-white/10 px-4 py-2 rounded"
      oninput="renderPlayers()">

    <select id="teamFilter" class="bg-white/10 px-4 py-2 rounded"
      onchange="renderPlayers()">
      <option value="ALL">All Teams</option>
      <option value="LAD">LAD</option>
      <option value="NYY">NYY</option>
      <option value="ATL">ATL</option>
    </select>

    <select id="positionFilter" class="bg-white/10 px-4 py-2 rounded"
      onchange="renderPlayers()">
      <option value="ALL">All Positions</option>
      <option value="SP">SP</option>
      <option value="RF">RF</option>
      <option value="DH">DH</option>
    </select>

    <select id="sortOVR" class="bg-white/10 px-4 py-2 rounded"
      onchange="renderPlayers()">
      <option value="DESC">OVR High → Low</option>
      <option value="ASC">OVR Low → High</option>
    </select>

  </div>

  <div id="playerGrid" class="grid md:grid-cols-3 gap-10"></div>

</section>

<script>

const players = [
  {
    name: "Shohei Ohtani",
    team: "LAD",
    position: "DH",
    rarity: "SIGNATURE",
    ovr: 66,
    logo: "lad.png",
    image: "ohtani.jpg",
    stats: { Power: 92, Contact: 88, Speed: 78 }
  },
  {
    name: "Aaron Judge",
    team: "NYY",
    position: "RF",
    rarity: "PRIME",
    ovr: 64,
    logo: "nyy.png",
    image: "judge.jpg",
    stats: { Power: 95, Contact: 84, Speed: 60 }
  }
];

function renderPlayers(){

  const grid = document.getElementById("playerGrid");
  grid.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();
  const team = document.getElementById("teamFilter").value;
  const position = document.getElementById("positionFilter").value;
  const sort = document.getElementById("sortOVR").value;

  let filtered = players.filter(p =>
    p.name.toLowerCase().includes(search) &&
    (team === "ALL" || p.team === team) &&
    (position === "ALL" || p.position === position)
  );

  filtered.sort((a,b)=> sort==="DESC" ? b.ovr-a.ovr : a.ovr-b.ovr);

  filtered.forEach((player,index)=>{

    let statsHTML="";
    for(let stat in player.stats){
      statsHTML+=`
        <div class="mb-3">
          <p class="text-sm mb-1">${stat}</p>
          <div class="bg-white/10 rounded-full">
            <div class="stat-bar" id="stat-${index}-${stat}"></div>
          </div>
        </div>`;
    }

    const card=document.createElement("div");
    card.className="flip-card "+player.rarity;

    card.innerHTML=`
      <div class="flip-inner" onclick="flipCard(this,${index})">

        <div class="face relative">

          <img src="${player.logo}" class="team-logo">

          <div class="flex justify-between items-start mb-3">
            <div class="text-xs tracking-wider opacity-70">
              ${player.rarity}
            </div>
            <div class="px-3 py-1 rounded-full text-xs font-bold bg-black/70 border border-white/20">
              OVR ${player.ovr}
            </div>
          </div>

          <div class="card-art-wrapper mb-4">
            <img src="${player.image}">
          </div>

          <h3 class="font-semibold text-lg">${player.name}</h3>
          <p class="text-sm text-white/60">${player.team}</p>

          <div class="position-badge">
            ${player.position}
          </div>

        </div>

        <div class="face back">
          <h3 class="font-bold mb-4">${player.name}</h3>
          ${statsHTML}
        </div>

      </div>
    `;

    grid.appendChild(card);
  });
}

function flipCard(el,index){
  el.classList.toggle("flipped");

  if(el.classList.contains("flipped")){
    const player=players[index];
    setTimeout(()=>{
      for(let stat in player.stats){
        document.getElementById(`stat-${index}-${stat}`)
          .style.width=player.stats[stat]+"%";
      }
    },200);
  }
}

renderPlayers();

</script>

</body>
</html>
