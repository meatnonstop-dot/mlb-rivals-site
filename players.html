<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin:0;
      background:
        radial-gradient(circle at center, rgba(30,41,59,0.6), #000 70%),
        url("https://images.unsplash.com/photo-1508341591423-4347099e1f19?q=80&w=1920&auto=format&fit=crop");
      background-size: cover;
      background-attachment: fixed;
      background-blend-mode: overlay;
    }

    /* ===== CARD STRUCTURE ===== */
    .flip-card { perspective:1200px; }

    .flip-inner {
      position:relative;
      width:100%;
      height:340px;
      transform-style:preserve-3d;
      transition:transform .8s cubic-bezier(.22,.61,.36,1);
    }

    .flipped { transform:rotateY(180deg); }

    .face {
      position:absolute;
      width:100%;
      height:100%;
      border-radius:18px;
      backface-visibility:hidden;
      padding:1.5rem;
      background:rgba(0,0,0,0.9);
      border:1px solid rgba(255,255,255,0.08);
      overflow:hidden;
    }

    .back { transform:rotateY(180deg); }

    /* ===== REVEAL ANIMATION ===== */
    .reveal {
      animation: revealIn .6s ease-out forwards;
      transform:scale(.8);
      opacity:0;
    }

    @keyframes revealIn {
      to { transform:scale(1); opacity:1; }
    }

    /* ===== RARITY BADGE ===== */
    .badge {
      position:absolute;
      top:12px;
      left:12px;
      padding:4px 10px;
      font-size:11px;
      border-radius:999px;
      font-weight:bold;
      letter-spacing:.5px;
      animation: badgePulse 3s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%,100% { box-shadow:0 0 8px rgba(255,255,255,0.1); }
      50% { box-shadow:0 0 20px rgba(255,255,255,0.4); }
    }

    .SIGNATURE .badge {
      background:linear-gradient(to right,#ec4899,#9333ea);
    }
    .PRIME .badge {
      background:linear-gradient(to right,#3b82f6,#6366f1);
    }
    .IMPACT .badge {
      background:linear-gradient(to right,#10b981,#14b8a6);
    }

    /* ===== STAT BAR ===== */
    .stat-bar {
      height:10px;
      border-radius:999px;
      width:0%;
      transition:width .9s cubic-bezier(.22,.61,.36,1);
    }

    .SIGNATURE .stat-bar { background:linear-gradient(to right,#ec4899,#9333ea); }
    .PRIME .stat-bar { background:linear-gradient(to right,#3b82f6,#6366f1); }
    .IMPACT .stat-bar { background:linear-gradient(to right,#10b981,#14b8a6); }

    /* ===== PACK OVERLAY ===== */
    .overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.8);
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      z-index:50;
    }

    .overlay.active { display:flex; }

  </style>
</head>

<body class="text-white min-h-screen">

<header class="bg-black/70 backdrop-blur border-b border-white/10 p-5 flex justify-between items-center">
  <h1 class="text-2xl font-extrabold text-blue-400">MLB RIVALS</h1>
  <button onclick="openPack()" class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-600 transition">
    Open Pack
  </button>
</header>

<section class="max-w-6xl mx-auto px-6 py-10">
  <h2 class="text-4xl font-extrabold mb-6">Player Index</h2>
  <div id="playerGrid" class="grid md:grid-cols-3 gap-10"></div>
</section>

<div id="packOverlay" class="overlay">
  <h2 class="text-3xl font-bold mb-6">Pack Opening...</h2>
  <button onclick="closePack()" class="bg-red-500 px-4 py-2 rounded">
    Close
  </button>
</div>

<script>
const players = [
  { name:"Shohei Ohtani", team:"LAD", rarity:"SIGNATURE", ovr:66,
    stats:{Power:92,Contact:88,Speed:78} },

  { name:"Aaron Judge", team:"NYY", rarity:"PRIME", ovr:64,
    stats:{Power:95,Contact:84,Speed:60} },

  { name:"Ronald Acuña Jr.", team:"ATL", rarity:"IMPACT", ovr:65,
    stats:{Power:89,Contact:90,Speed:93} }
];

function renderPlayers(reveal=false) {

  const grid=document.getElementById("playerGrid");
  grid.innerHTML="";

  players.forEach((player,index)=>{

    let statsHTML="";
    for(let stat in player.stats){
      statsHTML+=`
        <div class="mb-3">
          <p class="text-sm mb-1">${stat}</p>
          <div class="bg-white/10 rounded-full">
            <div class="stat-bar" id="stat-${index}-${stat}"></div>
          </div>
        </div>`;
    }

    const card=document.createElement("div");
    card.className="flip-card "+player.rarity+(reveal?" reveal":"");

    card.innerHTML=`
      <div class="flip-inner" onclick="flipCard(this,${index})">

        <div class="face">
          <div class="badge">${player.rarity}</div>

          <div class="flex justify-between text-sm mb-2 mt-6">
            <span>${player.team}</span>
            <span>OVR ${player.ovr}</span>
          </div>

          <div class="h-40 bg-white/5 rounded mb-4 flex items-center justify-center text-white/40">
            CARD ART
          </div>

          <h3 class="font-semibold">${player.name}</h3>
        </div>

        <div class="face back">
          <h3 class="font-bold mb-4">${player.name}</h3>
          ${statsHTML}
        </div>

      </div>`;

    grid.appendChild(card);
  });
}

function flipCard(element,index){
  element.classList.toggle("flipped");

  if(element.classList.contains("flipped")){
    const player=players[index];
    setTimeout(()=>{
      for(let stat in player.stats){
        document.getElementById(`stat-${index}-${stat}`)
          .style.width=player.stats[stat]+"%";
      }
    },200);
  }
}

function openPack(){
  document.getElementById("packOverlay").classList.add("active");
  setTimeout(()=>{
    document.getElementById("packOverlay").classList.remove("active");
    renderPlayers(true);
  },1200);
}

function closePack(){
  document.getElementById("packOverlay").classList.remove("active");
}

renderPlayers();
</script>

</body>
</html>
