<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Players</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background: radial-gradient(circle at top, #111827, #000); }

    .card-glow { box-shadow: 0 0 30px rgba(236,72,153,0.35); }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 25px rgba(236,72,153,0.35); }
      50% { box-shadow: 0 0 45px rgba(236,72,153,0.55); }
      100% { box-shadow: 0 0 25px rgba(236,72,153,0.35); }
    }

    .pulse { animation: pulseGlow 3s infinite ease-in-out; }

    .stat-bar {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(to right, #ec4899, #9333ea);
    }
  </style>
</head>

<body class="text-white min-h-screen">

<header class="sticky top-0 z-50 bg-black/80 backdrop-blur border-b border-white/10">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-2xl font-extrabold tracking-wider text-blue-400">
      MLB RIVALS
    </h1>
    <nav class="hidden md:flex gap-6 text-sm text-white/70">
      <a href="index.html">Home</a>
      <a href="scouts.html">Scouts</a>
      <a href="players.html" class="text-white">Players</a>
      <a href="updates.html">Updates</a>
      <a href="guide.html">Guide</a>
    </nav>
  </div>
</header>

<section class="max-w-6xl mx-auto px-6 py-12">

  <h2 class="text-4xl font-extrabold mb-8">Player Index</h2>

  <!-- Filters -->
  <div class="flex flex-col md:flex-row gap-4 mb-10">
    <input 
      id="searchInput"
      type="text"
      placeholder="Search player..."
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/2"
      onkeyup="filterPlayers()"
    />

    <select 
      id="teamFilter"
      class="bg-white/10 px-4 py-2 rounded w-full md:w-1/4"
      onchange="filterPlayers()"
    >
      <option value="all">All Teams</option>
      <option value="LAD">LAD</option>
      <option value="NYY">NYY</option>
      <option value="ATL">ATL</option>
    </select>
  </div>

  <div id="playerGrid" class="grid md:grid-cols-2 gap-10">

    <!-- Player Card -->
    <details class="player-card card-glow pulse rounded-2xl bg-gradient-to-br from-pink-600 to-fuchsia-600 p-[1px]" data-team="LAD" data-name="Shohei Ohtani">
      <summary class="bg-black/80 rounded-2xl p-6 cursor-pointer list-none hover:-translate-y-2 hover:scale-[1.02] transition">
        <div class="flex justify-between text-sm mb-2">
          <span>SIGNATURE</span>
          <span>OVR 66</span>
        </div>
        <div class="h-40 bg-white/5 rounded mb-4 flex items-center justify-center text-white/40">
          CARD ART
        </div>
        <h3 class="font-semibold">Shohei Ohtani</h3>
        <p class="text-sm text-white/60">LAD · SP / DH</p>
      </summary>

      <div class="bg-black/90 p-6 space-y-4">
        <div><p class="text-sm mb-1">Power</p><div class="bg-white/10 rounded-full"><div class="stat-bar" style="width:92%"></div></div></div>
        <div><p class="text-sm mb-1">Contact</p><div class="bg-white/10 rounded-full"><div class="stat-bar" style="width:88%"></div></div></div>
      </div>
    </details>

    <!-- Second Player -->
    <details class="player-card rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-600 p-[1px]" data-team="NYY" data-name="Aaron Judge">
      <summary class="bg-black/80 rounded-2xl p-6 cursor-pointer list-none hover:-translate-y-2 hover:scale-[1.02] transition">
        <div class="flex justify-between text-sm mb-2">
          <span>PRIME</span>
          <span>OVR 64</span>
        </div>
        <div class="h-40 bg-white/5 rounded mb-4 flex items-center justify-center text-white/40">
          CARD ART
        </div>
        <h3 class="font-semibold">Aaron Judge</h3>
        <p class="text-sm text-white/60">NYY · RF</p>
      </summary>

      <div class="bg-black/90 p-6 space-y-4">
        <div><p class="text-sm mb-1">Power</p><div class="bg-white/10 rounded-full"><div class="stat-bar" style="width:95%"></div></div></div>
        <div><p class="text-sm mb-1">Contact</p><div class="bg-white/10 rounded-full"><div class="stat-bar" style="width:84%"></div></div></div>
      </div>
    </details>

  </div>
</section>

<script>
function filterPlayers() {
  let search = document.getElementById("searchInput").value.toLowerCase();
  let team = document.getElementById("teamFilter").value;
  let cards = document.getElementsByClassName("player-card");

  for (let card of cards) {
    let name = card.getAttribute("data-name").toLowerCase();
    let cardTeam = card.getAttribute("data-team");

    let matchesSearch = name.includes(search);
    let matchesTeam = team === "all" || team === cardTeam;

    card.style.display = (matchesSearch && matchesTeam) ? "block" : "none";
  }
}
</script>

</body>
</html>
