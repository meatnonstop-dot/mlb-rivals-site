<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Scouts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: radial-gradient(circle at top, #111827, #000); }
    .glow { box-shadow: 0 0 35px rgba(59,130,246,0.35); }
  </style>
</head>
<body class="text-white min-h-screen">

<header class="sticky top-0 z-50 bg-black/80 backdrop-blur border-b border-white/10">
  <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
    <h1 class="text-2xl font-extrabold tracking-wider text-blue-400">MLB RIVALS</h1>
    <nav class="hidden md:flex gap-6 text-sm text-white/70">
      <a href="index.html">Home</a>
      <a href="scouts.html" class="text-white">Scouts</a>
      <a href="players.html">Players</a>
      <a href="updates.html">Updates</a>
      <a href="guide.html">Guide</a>
    </nav>
  </div>
</header>

<section class="max-w-6xl mx-auto px-6 py-16">
  <h2 class="text-4xl font-extrabold mb-10">Scouts & Events</h2>

  <div class="grid md:grid-cols-2 gap-10">

    <div class="glow rounded-2xl bg-gradient-to-br from-pink-600 to-fuchsia-600 p-[1px]">
      <div class="bg-black/80 rounded-2xl p-8 transition duration-300 hover:-translate-y-2 hover:scale-[1.03]">
        <h3 class="text-2xl font-bold mb-4">Premium Scout</h3>
        <p class="text-white/60 mb-6">
          Highest chance at Signature and Prime players.
        </p>
        <button class="bg-white/10 px-5 py-2 rounded hover:bg-white/20 transition">
          View Drop Rates
        </button>
      </div>
    </div>

    <div class="glow rounded-2xl bg-gradient-to-br from-emerald-600 to-teal-600 p-[1px]">
      <div class="bg-black/80 rounded-2xl p-8 transition duration-300 hover:-translate-y-2 hover:scale-[1.03]">
        <h3 class="text-2xl font-bold mb-4">Moment Scout</h3>
        <p class="text-white/60 mb-6">
          Limited-time players tied to historic performances.
        </p>
        <button class="bg-white/10 px-5 py-2 rounded hover:bg-white/20 transition">
          View Drop Rates
        </button>
      </div>
    </div>

  </div>
</section>

</body>
</html>
