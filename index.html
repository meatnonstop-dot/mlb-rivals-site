<!DOCTYPE html>
<html>
<head>
  <title>MLB Rivals – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f172a, #000);
    }

    .nav-link {
      position: relative;
      padding: 6px 0;
      transition: color .3s ease;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0%;
      height: 2px;
      background: #3b82f6;
      transition: width .3s ease;
    }

    .nav-link:hover {
      color: white;
    }

    .nav-link:hover::after {
      width: 100%;
    }
  </style>
</head>

<body class="text-white min-h-screen">

<header class="bg-black/85 backdrop-blur border-b border-white/10 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <a href="index.html" class="flex items-center gap-3 group">
      <div class="w-3 h-3 rounded-full bg-blue-500 animate-pulse group-hover:scale-110 transition"></div>
      <h1 class="text-xl font-extrabold tracking-wider text-blue-400 group-hover:text-blue-300 transition">
        MLB RIVALS
      </h1>
    </a>

    <nav class="flex gap-8 text-sm text-white/70">
      <a href="index.html" class="nav-link text-white">Home</a>
      <a href="scouts.html" class="nav-link">Scouts</a>
      <a href="players.html" class="nav-link">Players</a>
      <a href="updates.html" class="nav-link">Updates</a>
      <a href="guide.html" class="nav-link">Guide</a>
    </nav>

  </div>
</header>

<section class="max-w-6xl mx-auto px-6 py-20 text-center">
  <h2 class="text-5xl font-extrabold mb-6">Welcome to MLB Rivals Hub</h2>
  <p class="text-white/60 text-lg max-w-2xl mx-auto">
    Browse players, scouting data, updates, and game guides — all in one place.
  </p>
</section>

</body>
</html>
